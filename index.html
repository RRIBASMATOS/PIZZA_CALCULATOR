<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Calculadora Profissional de Massas de Pizza</title><link rel="stylesheet" href="styles.css"></head><body><main class="container"><header><h1>Calculadora Profissional de Massas de Pizza</h1><p>Motor paramétrico aderente à metodologia: farinha, fermentação, levain, forno, superfície e estilo.</p></header><section class="card"><h2>Produto</h2><div class="grid"><label>Estilo<select id="style"></select></label><label>Subestilo<select id="substyle"></select></label><label>Formato<select id="shape"><option value="round">Redonda</option><option value="pan">Forma/assadeira</option></select></label><label>Quantidade<input id="qty" type="number" value="6" min="1"></label><label>Diâmetro (cm)<input id="diameter" type="number" value="29" step="0.5"></label><label>Comprimento forma (cm)<input id="length" type="number" value="25" step="0.5"></label><label>Largura forma (cm)<input id="width" type="number" value="20" step="0.5"></label><label>Fator manual de massa<input id="massOverride" type="number" placeholder="auto" step="1"></label></div></section><section class="card"><h2>Farinha</h2><div class="grid"><label>Preset<select id="flourPreset"></select></label><label>Proteína (%)<input id="protein" type="number" value="12" step="0.1"></label><label>W<input id="w" type="number" value="300" step="5"></label><label>P/L<input id="pl" type="number" value="0.6" step="0.05"></label><label>Absorção (%)<input id="abs" type="number" value="58" step="0.5"></label><label>Cinzas (%)<input id="ash" type="number" value="0.55" step="0.01"></label><label>Falling Number<input id="fn" type="number" value="300" step="5"></label></div></section><section class="card"><h2>Fermentação</h2><div class="grid"><label>Tipo de fermentação<select id="yeastType"><option value="instant">Seco instantâneo</option><option value="activeDry">Seco ativo</option><option value="fresh">Fresco</option><option value="levain">Fermento natural / levain</option></select></label><label>Horas ambiente<input id="roomHours" type="number" value="5" step="0.5"></label><label>Temp. ambiente (°C)<input id="roomTemp" type="number" value="24" step="0.5"></label><label>Horas geladeira<input id="coldHours" type="number" value="19" step="0.5"></label><label>Temp. geladeira (°C)<input id="coldTemp" type="number" value="5" step="0.5"></label><label>Umidade (%)<input id="humidity" type="number" value="78" step="1"></label><label>Hidratação levain (%)<input id="levainHyd" type="number" value="100" step="5"></label><label>Acidez desejada<select id="acid"><option value="low">Baixa</option><option value="medium" selected>Média</option><option value="high">Alta</option></select></label></div></section><section class="card"><h2>Forno, superfície e ingredientes</h2><div class="grid"><label>Temperatura forno (°C)<input id="oven" type="number" value="250" step="5"></label><label>Superfície<select id="surface"><option value="none">Sem pedra/chapa</option><option value="tray">Assadeira comum</option><option value="stone">Pedra refratária</option><option value="steel">Chapa de aço</option><option value="detroitPan">Forma Detroit/pan</option></select></label><label>Pré-aquecimento (min)<input id="preheat" type="number" value="60" step="5"></label><label>Hidratação manual (%)<input id="hydOverride" type="number" placeholder="auto" step="0.5"></label><label>Sal manual (%)<input id="saltOverride" type="number" placeholder="auto" step="0.1"></label><label>Óleo/azeite manual (%)<input id="oilOverride" type="number" placeholder="auto" step="0.1"></label><label>Açúcar manual (%)<input id="sugarOverride" type="number" placeholder="auto" step="0.1"></label><label>Mel manual (%)<input id="honeyOverride" type="number" placeholder="auto" step="0.1"></label><label>Fermento manual (%)<input id="yeastOverride" type="number" placeholder="auto" step="0.001"></label></div></section><section class="actions"><button id="calc">Calcular</button><button onclick="window.print()">Imprimir / PDF</button></section><section class="card"><h2>Resultado</h2><div id="result"></div></section></main><script type="module" src="src/main.js"></script></body></html>
